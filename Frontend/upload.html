<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InsightFlow - Analysis</title>

<link rel="stylesheet" href="upload.css">

<link 
rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>


<body>


<header>

<nav>

<div class="logo">
Insight<span>Flow</span>
</div>

</nav>

</header>



<section class="analysis-container">


<div class="upload-section">


<h1>
Upload Your Files
</h1>


<p>
Upload your CSV or Excel files and get meaningful insights from your data.
</p>



<div class="upload-box" id="drop-area">


<i class="fa-solid fa-cloud-arrow-up"></i>


<h2>
Drag & Drop Files Here
</h2>


<p>
or
</p>



<label class="upload-btn">

Choose Files

<input 
type="file"
id="fileInput"
multiple
accept=".csv,.xlsx,.xls">

</label>


<small>
Supported files: CSV, XLSX, XLS
</small>


</div>



<div id="file-list"></div>


<p id="error-message"></p>



<button 
class="analyze-btn"
id="analyze-btn">

Upload Files

</button>




</div>




<div class="uploaded-section">


<h2>
Uploaded Files
</h2>


<div id="uploaded-files">
    

</div>
<button
class="analysis-btn"
id="analysis-btn">

Start Analysis

</button>

</div>


</section>



<script src="upload.js"></script>


</body>

</html>
